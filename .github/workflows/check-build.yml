name: Check build

on:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 10
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "pnpm"
      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm build
